<groupbox
  xmlns="http://www.mozilla.org/keymaster/gatekeeper/there.is.only.xul"
  xmlns:html="http://www.w3.org/1999/xhtml"
>
  <label><html:h2 style="margin: 0 0 16px 0; font-size: 16px;">Numify Settings</html:h2></label>

  <!-- Max Depth -->
  <hbox align="center" style="margin-bottom: 4px;">
    <label value="Max depth (1–20):" style="min-width: 150px;"/>
    <html:input
      type="number"
      id="numify-maxDepth"
      min="1"
      max="20"
      step="1"
      style="width: 64px; margin-left: 8px; padding: 2px 4px;"
    />
  </hbox>
  <description style="font-size: 11px; color: gray; margin: 0 0 16px 4px;">
    Collections deeper than this level will not receive a numeric prefix.
  </description>

  <!-- Separator -->
  <hbox align="center">
    <label value="Separator:" style="min-width: 150px;"/>
    <menulist id="numify-separator" style="margin-left: 8px;">
      <menupopup>
        <menuitem label="Space  —  1.2.3 My Collection"   value=" "  />
        <menuitem label="Pipe   —  1.2.3 | My Collection" value=" | "/>
        <menuitem label="Colon  —  1.2.3: My Collection"  value=": " />
      </menupopup>
    </menulist>
  </hbox>
</groupbox>
